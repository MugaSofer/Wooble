<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wooble — search Wildbow's serials</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --ink: #e8eaed; --muted: #9aa0aa;
      --accent: #ff6b6b; --line: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    header { text-align: center; margin: 7vh 1rem 1.25rem; }
    .logo { font-size: clamp(2.8rem, 9vw, 4.5rem); font-weight: 800; letter-spacing: -2px; }
    .logo span { color: var(--accent); }
    .tag { color: var(--muted); margin-top: .25rem; font-size: 1.05rem; }
    main { width: min(720px, 92vw); padding-bottom: 4rem; }
    #q {
      width: 100%; padding: .85rem 1.1rem; font-size: 1.1rem; color: var(--ink);
      background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
      outline: none;
    }
    #q:focus { border-color: var(--accent); }
    #filters { display: flex; flex-wrap: wrap; gap: .5rem; margin: .9rem .2rem .2rem; }
    #filters label {
      display: inline-flex; align-items: center; gap: .35rem; cursor: pointer;
      font-size: .85rem; color: var(--muted); background: var(--panel);
      border: 1px solid var(--line); border-radius: 999px; padding: .25rem .7rem;
      user-select: none;
    }
    #filters label:has(input:checked) { color: var(--ink); border-color: var(--accent); }
    #filters input { accent-color: var(--accent); }
    #filters .count { opacity: .55; font-variant-numeric: tabular-nums; }
    #status { color: var(--muted); font-size: .85rem; margin: 1rem .2rem .4rem; min-height: 1.2em; }
    #results { list-style: none; margin: 0; padding: 0; }
    .result { padding: 1rem 0; border-top: 1px solid var(--line); }
    .r-head { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap; }
    .r-title { color: #cdd3ff; font-size: 1.15rem; font-weight: 600; text-decoration: none; }
    .r-title:hover { text-decoration: underline; }
    .source-pill {
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      color: var(--accent); background: #241317; padding: .12rem .5rem; border-radius: 999px;
    }
    .r-excerpt { color: var(--ink); margin: .4rem 0 .35rem; line-height: 1.55; }
    .r-excerpt mark { background: #4a3b12; color: #ffe8a3; padding: 0 .1em; border-radius: 2px; }
    .r-url { color: var(--muted); font-size: .8rem; text-decoration: none; word-break: break-all; }
    .r-url:hover { color: var(--accent); }
    footer {
      color: var(--muted); font-size: .82rem; text-align: center;
      max-width: 640px; margin: auto 1rem 2rem; line-height: 1.5;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Wo<span>o</span>ble</div>
    <div class="tag">Search across Wildbow's web serials.</div>
  </header>

  <main>
    <input id="q" type="search" autocomplete="off" autofocus
           placeholder="Search Worm, Pact, Twig, Pale…">
    <div id="filters" aria-label="Filter by work"></div>
    <div id="status"></div>
    <ol id="results"></ol>
  </main>

  <footer>
    Wooble is an unofficial fan-made finder. It shows snippets and links you
    straight to the original chapters — all stories are ©
    <a href="https://www.parahumans.net/">Wildbow</a> and are not hosted here.
  </footer>

  <script type="module">
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g,
      (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    const qEl = document.getElementById('q');
    const filtersEl = document.getElementById('filters');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const selectedWorks = new Set();
    const MAX_SHOWN = 12;

    const pagefind = await import('/pagefind/pagefind.js');

    // Build the per-work filter chips from the index's own filter counts.
    const available = await pagefind.filters();
    const works = Object.entries(available.work || {}).sort((a, b) => a[0].localeCompare(b[0]));
    filtersEl.innerHTML = works
      .map(([name, count]) =>
        `<label><input type="checkbox" value="${esc(name)}">${esc(name)}` +
        `<span class="count">${count}</span></label>`)
      .join('');

    filtersEl.addEventListener('change', (e) => {
      const cb = e.target;
      if (!(cb instanceof HTMLInputElement)) return;
      cb.checked ? selectedWorks.add(cb.value) : selectedWorks.delete(cb.value);
      run();
    });

    let timer;
    qEl.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(run, 180);
    });

    async function run() {
      const query = qEl.value.trim();
      if (!query) {
        resultsEl.innerHTML = '';
        statusEl.textContent = '';
        return;
      }
      statusEl.textContent = 'Searching…';

      // Multiple selected works are combined with OR via `any`; with none
      // selected we omit the filter entirely and search everything.
      const opts = selectedWorks.size
        ? { filters: { work: { any: [...selectedWorks] } } }
        : {};
      const search = await pagefind.search(query, opts);

      const total = search.results.length;
      const shown = await Promise.all(
        search.results.slice(0, MAX_SHOWN).map((r) => r.data()));

      statusEl.textContent = total
        ? `${total} result${total === 1 ? '' : 's'}${total > MAX_SHOWN ? ` (showing ${MAX_SHOWN})` : ''}`
        : 'No results.';

      resultsEl.innerHTML = shown
        .map((d) => {
          const url = (d.meta && d.meta.url) || d.url;
          const title = (d.meta && d.meta.title) || 'Chapter';
          const work = (d.meta && d.meta.work) || '';
          return `<li class="result">
            <div class="r-head">
              <a class="r-title" href="${esc(url)}" target="_blank" rel="noopener">${esc(title)}</a>
              ${work ? `<span class="source-pill">${esc(work)}</span>` : ''}
            </div>
            <p class="r-excerpt">${d.excerpt}</p>
            <a class="r-url" href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a>
          </li>`;
        })
        .join('');
    }
  </script>
</body>
</html>
